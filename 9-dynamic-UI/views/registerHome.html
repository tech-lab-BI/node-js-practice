<!doctype html>
<html lang="en">
  <head>
    <title>Home registration</title>
    <link rel="stylesheet" href="/css/output.css" />
  </head>
  <body
    class="min-h-screen bg-gray-100 flex flex-col items-center justify-center"
  >
    <h1 class="text-3xl font-bold text-blue-600 mb-6">
      Home Registration Page
    </h1>

    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg">
      <form action="/user/register-home" method="POST" class="space-y-5">
        <label for="name" class="block text-sm font-semibold text-gray-700">
          HOME :
        </label>

        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter HOME name"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          required
        />

        <button
          type="submit"
          class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-200"
        >
          Submit
        </button>
      </form>
    </div>
  </body>
</html>
